name: Build wol-status image

# Baut bei jedem Push auf main ein Multi-Arch-Image (amd64 + arm64) und
# veröffentlicht es. Endnutzer ziehen das Image dann mit `docker pull` —
# sie müssen weder Code klonen noch lokal bauen.
#
# Registries:
#   * GHCR (immer)        → ghcr.io/<owner>/wol-status:latest
#   * Docker Hub (optional) → <name>/wol-status:latest
#
# Docker Hub einschalten:
#   1. Repo-Settings → Variables: DOCKERHUB_USERNAME = dein Docker-Hub-Name
#   2. Repo-Settings → Secrets:   DOCKERHUB_TOKEN    = Access-Token aus hub.docker.com

on:
  push:
    branches: [main]
    paths:
      - 'wol-status/**'
      - '.github/workflows/wol-status-image.yml'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # nötig fürs Pushen zu GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (für arm64-Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Repo-Owner kleinschreiben (GHCR verlangt das)
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub (optional)
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image-Tags zusammenstellen
        id: tags
        run: |
          {
            echo "list<<EOF"
            echo "ghcr.io/${{ steps.owner.outputs.value }}/wol-status:latest"
            if [ -n "${{ vars.DOCKERHUB_USERNAME }}" ]; then
              echo "${{ vars.DOCKERHUB_USERNAME }}/wol-status:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & Push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./wol-status
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
